<div class="relative w-full max-w-[1200px] mx-auto overflow-hidden rounded-2xl shadow-lg mt-8 group">
  
  <div class="flex transition-transform duration-500 ease-in-out" 
       [style.transform]="'translateX(-' + (currentIndex * 100) + '%)'">
    
    @for (img of images; track img) {
      <div class="min-w-full flex-shrink-0">
        <img [src]="img" alt="Slide du carrousel" class="w-full h-[600px] object-cover object-bottom block">
      </div>
    }

  </div>

  <button (click)="prev()" class="absolute left-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/70 hover:bg-blue-600 text-slate-800 hover:text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 shadow-md">
    &#10094;
  </button>
  
  <button (click)="next()" class="absolute right-4 top-1/2 -translate-y-1/2 w-10 h-10 bg-white/70 hover:bg-blue-600 text-slate-800 hover:text-white rounded-full flex items-center justify-center opacity-0 group-hover:opacity-100 transition-all duration-300 shadow-md">
    &#10095;
  </button>
</div>


<div class="bg-[#1D283D] m-10 px-6 py-4 rounded-xl shadow-xl max-w-4xl mx-auto w-full border border-slate-700">
  <form [formGroup]="searchForm" (ngSubmit)="onSearch()"  class="flex flex-col gap-2">
    
    <div class="grid grid-cols-1 md:grid-cols-1 gap-4">
      
      <div class="flex flex-col">
        <label for="city-dark" class="text-sm font-medium text-slate-300">Ville <span class="text-red-400">*</span></label>
        <select name="lieu" id="lieu" required formControlName="city" required class="w-full mt-1 px-3 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-white cursor-pointer appearance-none" alt="Sélectionner une ville">
          <option value="" disabled selected>--Veuillez choisir une ville--</option>
          <option value="Paris">Paris</option>
          <option value="Lyon">Lyon</option>
          <option value="Lille">Lille</option>
          <option value="Bordeaux">Bordeaux</option>
          <option value="Marseille">Marseille</option>
          <option value="Lourdes">Lourdes</option>
        </select>
      </div>      
    </div>

    <div class="grid grid-cols-1 md:grid-cols-4 gap-4 pt-4">

      <div class="flex flex-col">
        <label for="arrival-dark" class="text-sm font-medium text-slate-300">Date d'arrivée <span class="text-red-400">*</span></label>
        <input type="date" formControlName="dateDebut" id="arrival-dark" [min]="today" required class="w-full mt-1 px-3 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-white [color-scheme:dark]" alt="Date d'arrivée">
      </div>

      <div class="flex flex-col">
        <label for="departure-dark" class="text-sm font-medium text-slate-300">Date de départ <span class="text-red-400">*</span></label>
        <input type="date" formControlName="dateFin" id="departure-dark" [min]="minDepartureDate" required class="w-full mt-1 px-3 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-white [color-scheme:dark]" alt="Date de départ">
      </div>

      <div class="flex flex-col">
        <label for="adults-dark" class="text-sm font-medium text-slate-300">Adultes <span class="text-red-400">*</span></label>
        <input type="number" formControlName="adults" id="adults-dark" min="1" value="1" class="w-full mt-1 px-3 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-white" alt="Nombre d'adultes">
      </div>

      <div class="flex flex-col">
        <label for="children-dark" class="text-sm font-medium text-slate-300">Enfants</label>
        <input type="number" formControlName="children" id="children-dark" min="0" value="0" class="w-full mt-1 px-3 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-blue-400 focus:outline-none text-white" alt="Nombre d'enfants">
      </div>

    </div>

    <div class="flex flex-col md:flex-row md:items-center justify-between gap-6 pt-4 mt-2 border-t border-slate-600">
      
      <div class="flex flex-wrap items-center gap-x-8 gap-y-3">
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="wifi" class="w-4 h-4 accent-[#18191C] bg-slate-800 border-slate-600 rounded" alt="Checkbox Wifi"> WiFi
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="piscine" class="w-4 h-4 accent-[#18191C] bg-slate-800 border-slate-600 rounded" alt="Checkbox Piscine"> Piscine
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="spa" class="w-4 h-4 accent-[#18191C] bg-slate-800 border-slate-600 rounded" alt="Checkbox Spa"> Spa
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="animaux" class="w-4 h-4 accent-[#18191C] bg-slate-800 border-slate-600 rounded" alt="Checkbox Animaux"> Animaux
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="parking" class="w-4 h-4 accent-[#18191C] bg-slate-800 border-slate-600 rounded" alt="Checkbox Parking"> Parking
        </label>
      </div>

      <div class="shrink-0 w-full md:w-auto">
        <button type="submit" class="w-full md:w-auto px-8 py-3 bg-[#005ab9] hover:bg-[#007bff] text-white font-bold rounded-lg transition-all duration-200 shadow-md">
          Rechercher
        </button>
      </div>
    </div>
  </form>
</div>

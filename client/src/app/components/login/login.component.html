<main>
  <section class="login-section">
    
    <form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="compact-search-form" novalidate>
      
      <h3>Connexion Espace Client</h3>

      @if (errorMessage) {
        <div class="error-alert" role="alert" style="background-color: #ffebee; color: #c62828; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ef9a9a;">
          {{ errorMessage }}
        </div>
      }

      <div class="form-group full-width">
        <label for="email">Email : <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="email" id="email" formControlName="email" class="rounded-input" required autocomplete="email">
      </div>

      <div class="form-group full-width">
        <label for="password">Mot de passe : <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="password" id="password" formControlName="password" class="rounded-input" required autocomplete="current-password">
      </div>

      <div class="form-bottom">
        <button type="submit" class="btn-primary rounded-btn" [disabled]="loginForm.invalid">
          Se connecter
        </button>
      </div>

    </form>

  </section>
</main>

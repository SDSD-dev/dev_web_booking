<main class="container" style="display: flex; justify-content: center; align-items: center; min-height: 60vh;">
  
  <section class="checkout-card" style="text-align: center; padding: 3rem 2rem; max-width: 600px; width: 100%;">

    @if (isLoading) {
      <div aria-live="polite">
        <svg style="width: 60px; height: 60px; color: #005ab9; animation: spin 1s linear infinite; margin: 0 auto 1.5rem auto;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10" opacity="0.25"></circle>
          <path d="M12 2a10 10 0 0 1 10 10" opacity="0.75"></path>
        </svg>
        
        <h1 class="section-title" style="margin-bottom: 1rem;">Vérification du paiement...</h1>
        <p style="color: #64748b; font-size: 1.1rem; font-weight: bold;">Ne fermez pas cette page.</p>
        
        <style>
          @keyframes spin { 100% { transform: rotate(360deg); } }
        </style>
      </div>
    }

    @if (!isLoading && success) {
      <div aria-live="assertive">
        <svg style="width: 80px; height: 80px; color: #10b981; margin: 0 auto 1.5rem auto;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"></path>
          <polyline points="22 4 12 14.01 9 11.01"></polyline>
        </svg>

        <h1 class="page-title" style="color: #10b981; font-size: 3rem; margin-bottom: 0.5rem;">Félicitations !</h1>
        <h2 class="section-title" style="margin-bottom: 2rem;">Votre réservation est confirmée.</h2>
        
        <div class="action-buttons" style="justify-content: center; flex-wrap: wrap; gap: 15px;">
          <a routerLink="/profile" class="btn-primary">Voir mes réservations</a>
          
          <a routerLink="/" class="btn-primary" style="background-color: #f1f5f9; color: #334155; border: 1px solid #cbd5e1;">
            Retour à l'accueil
          </a>
        </div>
      </div>
    }

    @if (!isLoading && errorMessage) {
      <div role="alert">
        <svg style="width: 80px; height: 80px; color: #ef4444; margin: 0 auto 1.5rem auto;" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="10"></circle>
          <line x1="12" y1="8" x2="12" y2="12"></line>
          <line x1="12" y1="16" x2="12.01" y2="16"></line>
        </svg>

        <h1 class="page-title" style="color: #ef4444; font-size: 3rem; margin-bottom: 0.5rem;">Oups !</h1>
        <p class="section-title" style="color: #ef4444; margin-bottom: 2rem;">{{ errorMessage }}</p>
        
        <div class="action-buttons" style="justify-content: center;">
          <a routerLink="/" class="btn-primary">Retourner à l'accueil</a>
        </div>
      </div>
    }

  </section>
</main>

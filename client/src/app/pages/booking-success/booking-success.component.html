<div style="text-align: center; padding: 50px; max-width: 600px; margin: 0 auto;">
  
  @if (isLoading) {
    <h2 class="text-1xl md:text-2xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-10 px-4">Vérification du paiement en cours... </h2>
    <p class="text-xl md:text-2xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-10 px-4">Ne fermez pas cette page.</p>
  }

  @if (!isLoading && success) {
    <div>
      <h1 class="text-4xl md:text-5xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-6 px-4 rounded-lg"> Merci !</h1>
      <h2 class="text-1xl md:text-2xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-10 px-4">Votre réservation est confirmée.</h2>
            
      <div style="margin-top: 30px;">
        <a routerLink="/profile" class="mt-6 px-8 py-3 bg-[#005ab9] text-white rounded-lg font-medium hover:bg-[#007bff] transition-colors shadow hover:shadow-lg">
          Voir mes réservations
        </a>
        <a routerLink="/" class="mt-6 px-8 py-3 bg-[#005ab9] text-white rounded-lg font-medium hover:bg-[#007bff] transition-colors shadow hover:shadow-lg">Retour à l'accueil</a>
      </div>
    </div>
  }

  @if (!isLoading && errorMessage) {
    <div>
      <h1 class="text-4xl md:text-5xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-6 px-4 rounded-lg">Oups ! </h1>
      <p class="text-xl md:text-2xl font-bold text-center text-transparent bg-clip-text bg-blue-500 py-10 px-4">{{ errorMessage }}</p>
      <a routerLink="/" class="mt-6 px-8 py-3 bg-[#005ab9] text-white rounded-lg font-medium hover:bg-[#007bff] transition-colors shadow hover:shadow-lg">Retourner à l'accueil</a>
    </div>
  }

</div>

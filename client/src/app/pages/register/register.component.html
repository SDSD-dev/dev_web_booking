<main>
  <section class="login-section">
    
    <form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="compact-search-form" novalidate>
      
      <h3>Créer un compte</h3>

      @if (errorMessage) {
        <div class="error-alert" role="alert" style="background-color: #ffebee; color: #c62828; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #ef9a9a;">
          {{ errorMessage }}
        </div>
      }
      @if (successMessage) {
        <div class="success-alert" role="status" style="background-color: #e8f5e9; color: #2e7d32; padding: 10px; margin-bottom: 15px; border-radius: 4px; border: 1px solid #a5d6a7;">
          {{ successMessage }}
        </div>
      }

      <div class="form-group full-width">
        <label for="nom">Nom <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="nom" formControlName="nom" class="rounded-input" required autocomplete="family-name">
      </div>

      <div class="form-group full-width">
        <label for="prenom">Prénom <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="prenom" formControlName="prenom" class="rounded-input" required autocomplete="given-name">
      </div>

      <div class="form-group full-width">
        <label for="telephone">Téléphone</label>
        <input type="tel" id="telephone" formControlName="telephone" class="rounded-input" autocomplete="tel">
      </div>

      <div class="form-group full-width">
        <label for="email">Email <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="email" id="email" formControlName="email" class="rounded-input" required autocomplete="email">
      </div>

      <div class="form-group full-width">
        <label for="password">Mot de passe <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="password" id="password" formControlName="password" class="rounded-input" required autocomplete="new-password">
        
        @if (registerForm.get('password')?.errors?.['minlength'] && registerForm.get('password')?.touched) {
          <small style="color: #e74c3c; display: block; margin-top: 5px; font-weight: bold;">
            6 caractères minimum requis.
          </small>
        }
      </div>

      <div class="form-bottom">
        <button type="submit" class="btn-primary rounded-btn" [disabled]="registerForm.invalid" style="width: 100%;">
          S'inscrire
        </button>
      </div>

      <p style="text-align: center; margin-top: 20px; font-size: 0.95rem;">
        Déjà inscrit ? 
        <a routerLink="/login" style="color: #005ab9; font-weight: bold; text-decoration: none;">Se connecter</a>
      </p>

    </form>
  </section>
</main>

<main>
  <section class="contact-section">
    
    @if (contactMessage) {
      <div role="status" style="background-color: #e8f5e9; color: #2e7d32; padding: 15px; margin-bottom: 25px; border-radius: 4px; border: 1px solid #a5d6a7; text-align: center; font-weight: bold;">
        {{ contactMessage }}
      </div>
    }

    <form [formGroup]="contactForm" (ngSubmit)="onSubmit()" class="compact-search-form" novalidate>
      
      <h3>Formulaire de contact</h3>
      
      <div class="form-group full-width">
        <label for="nom">Nom <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="nom" formControlName="nom" class="rounded-input" required autocomplete="family-name">
      </div>

      <div class="form-group full-width">
        <label for="prenom">Prénom <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="prenom" formControlName="prenom" class="rounded-input" required autocomplete="given-name">
      </div>

      <div class="form-group full-width">
        <label for="email">Email <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="email" id="email" formControlName="email" class="rounded-input" required autocomplete="email">
      </div>

      <div class="form-group full-width">
        <label for="phone">Téléphone</label>
        <input type="tel" id="phone" formControlName="phone" class="rounded-input" autocomplete="tel">
      </div>

      <div class="form-group full-width">
        <label for="message">Message <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <textarea id="message" formControlName="message" class="rounded-input" rows="5" required></textarea>
      </div>

      <div class="checkbox-group" style="margin-top: 10px; margin-bottom: 20px;">
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="consent_public">
          <span>Je consens à la publication de mon message.</span>
        </label>
      </div>

      <div class="form-bottom">
        <button type="submit" class="btn-primary rounded-btn" [disabled]="contactForm.invalid" style="width: 100%;">
          Envoyer
        </button>
      </div>

    </form>

  </section>
</main>

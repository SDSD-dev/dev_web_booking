<main>
  <section class="container admin-dashboard">
    
    <div class="admin-header">
      <div class="admin-titles">
        <h1>Bienvenue Administrateur</h1>
        <p class="admin-subtitle">Zone sécurisée : Gestion des établissements</p>
      </div>
      
      <a routerLink="/admin/hotel/new" class="btn-primary">
        + Ajouter un hôtel
      </a>
    </div>

    @if (isLoading) {
      <div style="text-align: center; padding: 3rem; color: #64748b; background: #f8fafc; border-radius: 8px; border: 1px solid #e2e8f0;">
        <p style="font-size: 1.1rem; font-weight: bold;">Chargement des données...</p>
      </div>
    } @else {
      
      <div class="table-wrapper">
        <table class="admin-table">
          
          <thead>
            <tr>
              <th class="col-id">ID</th>
              <th>Nom de l'hôtel</th>
              <th>Ville</th>
              <th class="col-actions">Actions</th>
            </tr>
          </thead>
          
          <tbody>
            @for (hotel of hotels; track hotel.id_hotel) {
              <tr>
                <td class="col-id">
                  <span class="badge-id">#{{ hotel.id_hotel }}</span>
                </td>
                
                <td>
                  <strong>{{ hotel.name }}</strong>
                </td>
                
                <td>
                  {{ hotel.city }}
                </td>
                
                <td class="action-buttons">
                  <a [routerLink]="['/admin/hotel/edit', hotel.id_hotel]" class="btn-action btn-edit" title="Modifier l'hôtel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"/></svg>
                    Éditer
                  </a>
                  
                  <a [routerLink]="['/hotel', hotel.id_hotel]" class="btn-action btn-view" title="Voir l'hôtel sur le site">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/><path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/></svg>
                    Voir
                  </a>
                  
                  <button (click)="deleteHotel(hotel.id_hotel)" class="btn-action btn-delete" title="Supprimer cet hôtel">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/></svg>
                    Supprimer
                  </button>
                </td>
              </tr>
            }
          </tbody>
          
        </table>
      </div>

    }
  </section>
</main>

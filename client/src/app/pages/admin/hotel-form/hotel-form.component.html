<div class="max-w-2xl mx-auto mt-10 mb-20 p-6 md:p-8 bg-[#1D283D] border border-slate-700 rounded-xl shadow-2xl w-full">
  
  <h2 class="text-2xl font-bold text-slate-100 mb-6 border-b border-slate-700 pb-4">
    {{ isEditMode ? 'Modifier l\'hôtel' : 'Ajouter un nouvel hôtel' }}
  </h2>

  @if (errorMessage) {
    <div class="bg-red-500/10 border border-red-500/50 text-red-400 px-4 py-3 rounded-lg mb-6 text-sm flex items-center gap-2 shadow-inner">
      <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
      {{ errorMessage }}
    </div>
  }

  <form [formGroup]="hotelForm" (ngSubmit)="onSubmit()" class="flex flex-col gap-5">
    
    <div class="flex flex-col">
      <label class="text-sm font-medium text-slate-300 mb-1.5">Nom de l'hôtel <span class="text-red-400">*</span></label>
      <input type="text" formControlName="name" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors">
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-medium text-slate-300 mb-1.5">Adresse <span class="text-red-400">*</span></label>
      <input type="text" formControlName="address" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors">
    </div>

    <div class="flex flex-col md:flex-row gap-5">
      <div class="flex flex-col flex-1">
        <label class="text-sm font-medium text-slate-300 mb-1.5">Ville <span class="text-red-400">*</span></label>
        <input type="text" formControlName="city" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors">
      </div>
      <div class="flex flex-col flex-1">
        <label class="text-sm font-medium text-slate-300 mb-1.5">Pays <span class="text-red-400">*</span></label>
        <input type="text" formControlName="country" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors">
      </div>
    </div>

    <div class="flex flex-col">
      <label class="text-sm font-medium text-slate-300 mb-1.5">Description <span class="text-red-400">*</span></label>
      <textarea formControlName="description" rows="5" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors resize-y"></textarea>
    </div>

    <fieldset class="border border-slate-600 p-4 rounded-lg bg-[#18191C]/30 mt-2">
      <legend class="text-sm font-semibold text-slate-300 px-2 bg-[#1D283D] rounded">Équipements</legend>
      <div class="flex flex-wrap gap-x-6 gap-y-4 mt-2">
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 text-sm font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="piscine" class="w-4 h-4 accent-[#005ab9] bg-slate-800 border-slate-600 rounded cursor-pointer"> Piscine
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 text-sm font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="spa" class="w-4 h-4 accent-[#005ab9] bg-slate-800 border-slate-600 rounded cursor-pointer"> Spa
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 text-sm font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="animaux" class="w-4 h-4 accent-[#005ab9] bg-slate-800 border-slate-600 rounded cursor-pointer"> Animaux acceptés
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 text-sm font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="wifi" class="w-4 h-4 accent-[#005ab9] bg-slate-800 border-slate-600 rounded cursor-pointer"> WiFi Gratuit
        </label>
        <label class="flex items-center gap-2 cursor-pointer text-slate-300 text-sm font-medium hover:text-white transition-colors">
          <input type="checkbox" formControlName="parking" class="w-4 h-4 accent-[#005ab9] bg-slate-800 border-slate-600 rounded cursor-pointer"> Parking
        </label>
      </div>
    </fieldset>

    @if (!isEditMode) {
      <div class="flex flex-col mt-2">
        <label class="text-sm font-medium text-slate-300 mb-1.5">Image de couverture <span class="text-slate-500 font-normal">(Optionnel)</span></label>
        <input type="text" formControlName="imageUrl" placeholder="https://example.com/image.jpg" class="w-full px-4 py-2 bg-[#18191C] border border-slate-600 rounded-lg focus:ring-2 focus:ring-[#005ab9] focus:outline-none text-white transition-colors placeholder-slate-600">
        <p class="text-xs text-slate-500 mt-2 flex items-center gap-1.5">
          <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          Astuce : Copiez l'adresse d'une image en ligne (clic droit > Copier l'adresse de l'image).
        </p>
      </div>
    }

    <div class="flex flex-col-reverse md:flex-row justify-end md:justify-between items-center gap-4 mt-6 pt-6 border-t border-slate-700">
      <a routerLink="/admin" class="w-full md:w-auto text-center text-slate-400 hover:text-slate-200 font-medium transition-colors py-2">
        Annuler
      </a>
      
      <button type="submit" [disabled]="hotelForm.invalid" class="w-full md:w-auto px-8 py-2.5 bg-[#005ab9] hover:bg-[#007bff] text-white font-bold rounded-lg transition-all duration-200 shadow-md disabled:opacity-50 disabled:cursor-not-allowed">
        {{ isEditMode ? 'Enregistrer les modifications' : 'Créer l\'hôtel' }}
      </button>
    </div>
    
  </form>
</div>

<main>
  <section class="admin-form-section" style="padding: 2rem 0;">
    
    <form [formGroup]="hotelForm" (ngSubmit)="onSubmit()" class="compact-form" novalidate>
      
      <h3>{{ isEditMode ? 'Modifier l\'hôtel' : 'Ajouter un nouvel hôtel' }}</h3>

      @if (errorMessage) {
        <div role="alert" style="background-color: #ffebee; color: #c62828; padding: 12px; margin-bottom: 20px; border-radius: 4px; border: 1px solid #ef9a9a; font-weight: bold;">
          {{ errorMessage }}
        </div>
      }

      <div class="form-group full-width">
        <label for="name">Nom de l'hôtel <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="name" formControlName="name" class="rounded-input" required>
      </div>

      <div class="form-group full-width">
        <label for="address">Adresse <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <input type="text" id="address" formControlName="address" class="rounded-input" required>
      </div>

      <div class="form-grid">
        <div class="form-group">
          <label for="city">Ville <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
          <input type="text" id="city" formControlName="city" class="rounded-input" required>
        </div>
        
        <div class="form-group">
          <label for="country">Pays <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
          <input type="text" id="country" formControlName="country" class="rounded-input" required>
        </div>
      </div>

      <div class="form-group full-width">
        <label for="description">Description <span aria-hidden="true" style="color: #e74c3c;">*</span></label>
        <textarea id="description" formControlName="description" rows="5" class="rounded-input" required></textarea>
      </div>

      <h3 style="margin-top: 1.5rem; margin-bottom: 1rem; font-size: 1.2rem;">Équipements</h3>
      <div class="checkbox-group" style="margin-bottom: 2rem;">
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="wifi">
          <span>Wifi</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="piscine">
          <span>Piscine</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="spa">
          <span>Spa</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="parking">
          <span>Parking</span>
        </label>
        <label class="custom-checkbox">
          <input type="checkbox" formControlName="animaux">
          <span>Animaux acceptés</span>
        </label>
      </div>

      @if (!isEditMode) {
        <div class="form-group full-width" style="margin-bottom: 2rem;">
          <label for="imageUrl">Image de couverture <small style="color: #64748b; font-weight: normal;">(Optionnel)</small></label>
          <input type="text" id="imageUrl" formControlName="imageUrl" class="rounded-input" placeholder="assets/img_hotels/nom-image.jpg">
          <small style="color: #64748b; display: block; margin-top: 5px;">
            Astuce : Placez l'image dans le dossier <strong>src/assets/</strong> de votre projet Angular et indiquez son chemin.
          </small>
        </div>
      }

      <div style="display: flex; align-items: center; justify-content: space-between; margin-top: 2rem; padding-top: 1.5rem; border-top: 1px solid #e2e8f0;">
        <a routerLink="/admin" style="color: #64748b; text-decoration: none; font-weight: bold;">Annuler</a>
        
        <button type="submit" class="btn-primary rounded-btn" [disabled]="hotelForm.invalid">
          {{ isEditMode ? 'Enregistrer les modifications' : 'Créer l\'hôtel' }}
        </button>
      </div>

    </form>
    
  </section>
</main>
